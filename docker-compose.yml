version: '3.8'

services:
  data-collector:
    build: ./data-collector
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    volumes:
      - ./data-collector:/app
      - /app/node_modules
    command: npm start

  analysis-server:
    build: ./analysis-server
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATA_COLLECTOR_URL=http://data-collector:3001
    volumes:
      - ./analysis-server:/app
      - /app/venv
    command: python app/main.py
    depends_on:
      - data-collector

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_DATA_COLLECTOR_URL=http://localhost:3001
      - NEXT_PUBLIC_ANALYSIS_SERVER_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - data-collector
      - analysis-server
